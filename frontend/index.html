<!DOCTYPE html>
<html>
<head>
    <title>Couple Tracker - Login & Register</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>

<div class="login-container">
    <div class="login-background"></div>
    
    <div class="login-card">
        <!-- Header Section -->
        <div class="login-header">
            <h1>🚗 Couple Race Tracker</h1>
            <p class="login-subtitle">Compete with your partner daily</p>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-container">
            <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">
                <span>Login</span>
            </button>
            <button class="tab-btn" data-tab="register" onclick="switchTab('register')">
                <span>Register</span>
            </button>
            <div class="tab-indicator"></div>
        </div>

        <!-- Login Tab -->
        <div class="tab-content active" id="login-tab">
            <form class="login-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="login-username" class="form-label">Username</label>
                    <input 
                        id="login-username" 
                        type="text"
                        class="form-input" 
                        placeholder="Enter your username"
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="login-password" class="form-label">Password</label>
                    <input 
                        id="login-password" 
                        type="password"
                        class="form-input" 
                        placeholder="Enter your password"
                        autocomplete="current-password"
                    >
                </div>

                <button 
                    type="button"
                    onclick="handleLoginTab()" 
                    class="btn btn-primary btn-full"
                >
                    Login
                </button>

                <div id="login-message" class="message"></div>
            </form>
        </div>

        <!-- Register Tab -->
        <div class="tab-content" id="register-tab">
            <form class="register-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="register-username" class="form-label">Username</label>
                    <input 
                        id="register-username" 
                        type="text"
                        class="form-input" 
                        placeholder="Choose your username"
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="register-password" class="form-label">Password</label>
                    <input 
                        id="register-password" 
                        type="password"
                        class="form-input" 
                        placeholder="Create a password"
                        autocomplete="new-password"
                    >
                </div>

                <div class="form-group">
                    <label for="register-confirm" class="form-label">Confirm Password</label>
                    <input 
                        id="register-confirm" 
                        type="password"
                        class="form-input" 
                        placeholder="Confirm your password"
                        autocomplete="new-password"
                    >
                </div>

                <button 
                    type="button"
                    onclick="handleRegisterTab()" 
                    class="btn btn-success btn-full"
                >
                    Create Account
                </button>

                <div id="register-message" class="message"></div>
            </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>Join your partner and start racing! 🏎️</p>
        </div>
    </div>
</div>

<script>
// Get BASE_URL (auto-production safe)
const BASE_URL = window.location.origin;

// ================== TAB SWITCHING ==================
function switchTab(tab) {
    // Update tab buttons
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

    // Update tab content
    document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
    });
    document.getElementById(`${tab}-tab`).classList.add('active');

    // Clear messages
    clearMessages();
}

// Clear all messages
function clearMessages() {
    document.getElementById('login-message').innerHTML = '';
    document.getElementById('register-message').innerHTML = '';
}

// ================== LOGIN HANDLER ==================
async function handleLoginTab() {
    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value.trim();
    const messageEl = document.getElementById('login-message');

    if (!username || !password) {
        showMessage(messageEl, "Please enter username and password", "error");
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/api/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok || data.error || !data.username) {
            showMessage(messageEl, data.error || data.message || "Login failed", "error");
            console.error("Login failed:", data);
            return;
        }

        // Store username in localStorage and redirect
        localStorage.setItem("userId", data.username);
        showMessage(messageEl, "✓ Login successful! Redirecting...", "success");
        
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 600);

    } catch (e) {
        console.error("Login error:", e);
        showMessage(messageEl, "Error: " + e.message, "error");
    }
}

// ================== REGISTER HANDLER ==================
async function handleRegisterTab() {
    const username = document.getElementById("register-username").value.trim();
    const password = document.getElementById("register-password").value.trim();
    const confirm = document.getElementById("register-confirm").value.trim();
    const messageEl = document.getElementById('register-message');

    if (!username || !password || !confirm) {
        showMessage(messageEl, "Please fill in all fields", "error");
        return;
    }

    if (username.length < 3) {
        showMessage(messageEl, "Username must be at least 3 characters", "error");
        return;
    }

    if (password.length < 6) {
        showMessage(messageEl, "Password must be at least 6 characters", "error");
        return;
    }

    if (password !== confirm) {
        showMessage(messageEl, "Passwords do not match", "error");
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/api/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok || data.error) {
            showMessage(messageEl, data.error || data.message || "Registration failed", "error");
            console.error("Register failed:", data);
            return;
        }

        showMessage(messageEl, "✓ Account created! Switching to Login tab...", "success");
        
        // Clear inputs
        document.getElementById("register-username").value = "";
        document.getElementById("register-password").value = "";
        document.getElementById("register-confirm").value = "";

        // Switch to login after 1 second
        setTimeout(() => {
            switchTab('login');
            document.getElementById("login-username").value = username;
            document.getElementById("login-password").focus();
        }, 1000);

    } catch (e) {
        console.error("Register error:", e);
        showMessage(messageEl, "Error: " + e.message, "error");
    }
}

// ================== MESSAGE DISPLAY ==================
function showMessage(element, text, type) {
    element.textContent = text;
    element.className = `message ${type}`;
}

// Allow Enter key to submit forms
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('login-username').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLoginTab();
    });

    document.getElementById('login-password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLoginTab();
    });
    
    document.getElementById('register-username').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') document.getElementById('register-password').focus();
    });

    document.getElementById('register-password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') document.getElementById('register-confirm').focus();
    });

    document.getElementById('register-confirm').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleRegisterTab();
    });
});
</script>

</body>
</html>
