<!DOCTYPE html>
<html>
<head>
    <title>Couple Tracker - Login & Register</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>

<div class="login-container">
    <div class="login-background"></div>
    
    <div class="login-card">
        <!-- Header Section -->
        <div class="login-header">
            <h1>🚗 Couple Race Tracker</h1>
            <p class="login-subtitle">Compete with your partner daily</p>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-container">
            <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">
                <span>Login</span>
            </button>
            <button class="tab-btn" data-tab="register" onclick="switchTab('register')">
                <span>Register</span>
            </button>
            <div class="tab-indicator"></div>
        </div>

        <!-- Login Tab -->
        <div class="tab-content active" id="login-tab">
            <form class="login-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="login-username" class="form-label">Username</label>
                    <input 
                        id="login-username" 
                        type="text"
                        class="form-input" 
                        placeholder="Enter your username"
                        autocomplete="username"
                    >
                </div>

                <button 
                    type="button"
                    onclick="handleLoginTab()" 
                    class="btn btn-primary btn-full"
                >
                    Login
                </button>

                <div id="login-message" class="message"></div>
            </form>
        </div>

        <!-- Register Tab -->
        <div class="tab-content" id="register-tab">
            <form class="register-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="register-username" class="form-label">Username</label>
                    <input 
                        id="register-username" 
                        type="text"
                        class="form-input" 
                        placeholder="Choose your username"
                        autocomplete="username"
                    >
                </div>

                <button 
                    type="button"
                    onclick="handleRegisterTab()" 
                    class="btn btn-success btn-full"
                >
                    Create Account
                </button>

                <div id="register-message" class="message"></div>
            </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>Join your partner and start racing! 🏎️</p>
        </div>
    </div>
</div>

<script>
// ================== TAB SWITCHING ==================
function switchTab(tab) {
    // Update tab buttons
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

    // Update tab content
    document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
    });
    document.getElementById(`${tab}-tab`).classList.add('active');

    // Clear messages
    clearMessages();
}

// Clear all messages
function clearMessages() {
    document.getElementById('login-message').innerHTML = '';
    document.getElementById('register-message').innerHTML = '';
}

// ================== LOGIN HANDLER ==================
function handleLoginTab() {
    const username = document.getElementById("login-username").value.trim();
    const messageEl = document.getElementById('login-message');

    if (!username) {
        showMessage(messageEl, "Please enter your username", "error");
        return;
    }

    // Store in localStorage and redirect (preserving existing behavior)
    localStorage.setItem("userId", username);
    window.location.href = "dashboard.html";
}

// ================== REGISTER HANDLER ==================
function handleRegisterTab() {
    const username = document.getElementById("register-username").value.trim();
    const messageEl = document.getElementById('register-message');

    if (!username) {
        showMessage(messageEl, "Please enter a username", "error");
        return;
    }

    if (username.length < 3) {
        showMessage(messageEl, "Username must be at least 3 characters", "error");
        return;
    }

    // Store in localStorage (frontend registration)
    localStorage.setItem("userId", username);
    showMessage(messageEl, "✓ Account registered successfully! Redirecting...", "success");

    // Clear input and redirect to dashboard after 1.5 seconds
    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 1500);
}

// ================== MESSAGE DISPLAY ==================
function showMessage(element, text, type) {
    element.textContent = text;
    element.className = `message ${type}`;
}

// Allow Enter key to submit forms
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('login-username').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLoginTab();
    });
    
    document.getElementById('register-username').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleRegisterTab();
    });
});
</script>

</body>
</html>
