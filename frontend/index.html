<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Couple Race Tracker — Login</title>
    <meta name="description" content="Compete with your partner daily by completing tasks. Login or register to start racing!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login-style.css">
</head>
<body>

<div class="login-container">
    <div class="login-background"></div>
    
    <div class="login-card">
        <!-- Header Section -->
        <div class="login-header">
            <div class="logo-icon">🏎️</div>
            <h1>Couple Race Tracker</h1>
            <p class="login-subtitle">Compete with your partner daily</p>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-container">
            <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">
                <span>Login</span>
            </button>
            <button class="tab-btn" data-tab="register" onclick="switchTab('register')">
                <span>Register</span>
            </button>
            <div class="tab-indicator" id="tabIndicator"></div>
        </div>

        <!-- Login Tab -->
        <div class="tab-content active" id="login-tab">
            <form class="login-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="login-username" class="form-label">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input id="login-username" type="text" class="form-input" placeholder="Enter your username" autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="login-password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input id="login-password" type="password" class="form-input" placeholder="Enter your password" autocomplete="current-password">
                    </div>
                </div>

                <button type="button" id="login-btn" onclick="handleLogin()" class="btn btn-primary btn-full">
                    <span class="btn-text">Login</span>
                    <span class="btn-loading" style="display:none">⏳ Logging in...</span>
                </button>

                <div id="login-message" class="message"></div>
            </form>
        </div>

        <!-- Register Tab -->
        <div class="tab-content" id="register-tab">
            <form class="register-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="register-username" class="form-label">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input id="register-username" type="text" class="form-input" placeholder="Choose your username (min 3 chars)" autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="register-password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input id="register-password" type="password" class="form-input" placeholder="Create a password (min 6 chars)" autocomplete="new-password">
                    </div>
                </div>

                <div class="form-group">
                    <label for="register-confirm" class="form-label">Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✅</span>
                        <input id="register-confirm" type="password" class="form-input" placeholder="Confirm your password" autocomplete="new-password">
                    </div>
                </div>

                <button type="button" id="register-btn" onclick="handleRegister()" class="btn btn-success btn-full">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loading" style="display:none">⏳ Creating account...</span>
                </button>

                <div id="register-message" class="message"></div>
            </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>Join your partner and start racing! 🏎️</p>
        </div>
    </div>
</div>

<script>
const existingUser = localStorage.getItem("userId");
const existingToken = localStorage.getItem("token");

if (existingUser && existingToken) {
    window.location.href = "dashboard.html";
}

const BASE_URL = window.location.origin;

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    document.getElementById(`${tab}-tab`).classList.add('active');

    const indicator = document.getElementById('tabIndicator');
    if (tab === 'register') {
        indicator.style.left = 'calc(50% + 2px)';
    } else {
        indicator.style.left = '4px';
    }
    clearMessages();
}

function clearMessages() {
    document.getElementById('login-message').innerHTML = '';
    document.getElementById('register-message').innerHTML = '';
}

async function handleLogin() {
    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;
    const messageEl = document.getElementById('login-message');
    const btn = document.getElementById('login-btn');

    if (!username) { showMessage(messageEl, "⚠️ Please enter your username", "error"); return; }
    if (!password) { showMessage(messageEl, "⚠️ Please enter your password", "error"); return; }

    setLoading(btn, true);

    try {
        const res = await fetch(`${BASE_URL}/api/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok || data.error) {
            showMessage(messageEl, data.error || "Login failed", "error");
            setLoading(btn, false);
            return;
        }

        // Persist auth securely
        localStorage.setItem("userId", data.username);
        if (data.token) localStorage.setItem("token", data.token);
        if (data.partner) localStorage.setItem("partner", data.partner);

        showMessage(messageEl, "✅ Login successful! Redirecting...", "success");
        setTimeout(() => window.location.href = "dashboard.html", 600);
    } catch (e) {
        console.error("Login error:", e);
        showMessage(messageEl, "❌ Connection error — is the server running?", "error");
        setLoading(btn, false);
    }
}

async function handleRegister() {
    const username = document.getElementById("register-username").value.trim();
    const password = document.getElementById("register-password").value;
    const confirm = document.getElementById("register-confirm").value;
    const messageEl = document.getElementById('register-message');
    const btn = document.getElementById('register-btn');

    if (!username || !password || !confirm) { showMessage(messageEl, "⚠️ Please fill in all fields", "error"); return; }
    if (username.length < 3) { showMessage(messageEl, "⚠️ Username must be at least 3 characters", "error"); return; }
    if (password.length < 6) { showMessage(messageEl, "⚠️ Password must be at least 6 characters", "error"); return; }
    if (password !== confirm) { showMessage(messageEl, "⚠️ Passwords do not match", "error"); return; }

    setLoading(btn, true);

    try {
        const res = await fetch(`${BASE_URL}/api/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok || data.error) {
            showMessage(messageEl, data.error || "Registration failed", "error");
            setLoading(btn, false);
            return;
        }

        showMessage(messageEl, "✅ Account created! Switching to login...", "success");
        document.getElementById("register-username").value = "";
        document.getElementById("register-password").value = "";
        document.getElementById("register-confirm").value = "";

        setTimeout(() => {
            switchTab('login');
            document.getElementById("login-username").value = username;
            document.getElementById("login-password").focus();
        }, 1000);
        setLoading(btn, false);
    } catch (e) {
        console.error("Register error:", e);
        showMessage(messageEl, "❌ Connection error — is the server running?", "error");
        setLoading(btn, false);
    }
}

function showMessage(element, text, type) {
    element.textContent = text;
    element.className = `message ${type}`;
}

function setLoading(btn, isLoading) {
    btn.querySelector('.btn-text').style.display = isLoading ? 'none' : 'inline';
    btn.querySelector('.btn-loading').style.display = isLoading ? 'inline' : 'none';
    btn.disabled = isLoading;
}

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('login-username').addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('login-password').addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('register-username').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('register-password').focus(); });
    document.getElementById('register-password').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('register-confirm').focus(); });
    document.getElementById('register-confirm').addEventListener('keypress', e => { if (e.key === 'Enter') handleRegister(); });
});
</script>

</body>
</html>
