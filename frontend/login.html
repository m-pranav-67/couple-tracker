<!DOCTYPE html>
<html>
<head>
    <title>Couple Tracker - Login</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>

<div class="login-container">
    <div class="login-background"></div>
    
    <div class="login-card">
        <div class="login-header">
            <h1>🏁 Couple Tracker</h1>
            <p class="login-subtitle">Track your races together</p>
        </div>

        <form class="login-form" onsubmit="return false;">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input 
                    id="username" 
                    type="text"
                    class="form-input" 
                    placeholder="Enter your username"
                    autocomplete="username"
                >
                <div class="input-focus-effect"></div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input 
                    id="password" 
                    type="password" 
                    class="form-input"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                >
                <div class="input-focus-effect"></div>
            </div>

            <div class="button-group">
                <button 
                    type="button"
                    onclick="login()" 
                    class="btn btn-primary"
                >
                    Login
                </button>
                <button 
                    type="button"
                    onclick="register()" 
                    class="btn btn-secondary"
                >
                    Register
                </button>
            </div>
        </form>

        <div class="login-footer">
            <p>Join your partner and start racing! 🏎️</p>
        </div>
    </div>
</div>

<script>
async function register() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if (!username || !password) {
        alert("Please fill in all fields");
        return;
    }

    const res = await fetch("https://race-tracker-yzon.onrender.com/auth/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();
    alert(data.message);
}

async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if (!username || !password) {
        alert("Please fill in all fields");
        return;
    }

    const res = await fetch("https://race-tracker-yzon.onrender.com/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.username) {
        localStorage.setItem("userId", data.username);
        window.location.href = "dashboard.html";
    } else {
        alert(data.message);
    }
}
</script>

</body>
</html>
